%YAML 1.2
---

$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google Wireless Charger Driver

maintainers:
  - Alice Sheng <alicesheng@google.com>
  - Yihsiang Peng <yihsiangpeng@google.com>
  - YiKai Peng <kenpeng@google.com>

description: |
  Wireless charging support of BPP/EPP/MPP protocol and integration with Google BMS system.

properties:
  compatible:
      enum:
      - renesas,ra9582
      - cps,cps4041
  reg:
    description: i2c address of the charger.

  irq-gpio:
    description: Interrupt GPIO.
    $ref: "types.yaml#/definitions/phandle"

  ap5v-gpio:
    description: GPIO to supply 5V to the WLC chip.
    $ref: "types.yaml#/definitions/phandle"

  mode-gpio:
    description: GPIO to change the WLC mode. For example, BPP EPP MPP
    $ref: "types.yaml#/definitions/phandle"

  inhibit-gpio:
    description: GPIO to disable the WLC chip.
    $ref: "types.yaml#/definitions/phandle"

  wcin_inlim_en-gpio:
    description: GPIO to enable input current limiting based on load.
    $ref: "types.yaml#/definitions/phandle"

  google,high_soc_thresholds:
    description: Battery percentage thresholds at which to start input current limiting based on load.
    $ref: /schemas/types.yaml#/definitions/uint32

  capdiv-regulator:
    description: Regulator which controls a 2:1 divider placed on the output of WLC chip. It should
      be set up such that "Fast" corresponds to dividing mode and "Normal" corresponds to bypass
      mode.
    $ref: "types.yaml#/definitions/phandle"

  google,fg-power-supply:
    description: Power supply which corresponds to the fuel gauge. Will be used to read the battery
      percentage.
    $ref: "types.yaml#/definitions/phandle"

  google,bpp_fods:
    description: FOD array to write to FOD registers during BPP mode.
    $ref: /schemas/types.yaml#/definitions/uint8-array

  google,wlc_tx_id:
    description: Support reading tx_id of pixel stands
    type: boolean

  google,hda-tz-wlc:
    description: This will enable 1 value for hda thermal zone upon any wireless charger going online,
      to inform thermal to set temp target
    type: boolean

  google,project_id:
    description: The project id defined in FW is used to identify whether it is correct
    $ref: /schemas/types.yaml#/definitions/uint8

  google,wlc_eoc_cloak:
    description: enable cloak mode when Rx is online but not charging
    $ref: boolean

  bpp_mdis_pwr:
    description: thermal table use for BPP charger
    $ref: /schemas/types.yaml#/definitions/uint32-arrary

  epp_mdis_pwr:
    description: thermal table use for EPP charger
    $ref: /schemas/types.yaml#/definitions/uint32-arrary

  mpp_mdis_pwr:
    description: thermal table use for MPP charger
    $ref: /schemas/types.yaml#/definitions/uint32-arrary

  google,has_wlc_dc:
    description: Support charge pump
    type: boolean

  mpp_eds_soc:
    description: soc table of eds icl use for MPP charger
    $ref: /schemas/types.yaml#/definitions/uint32-arrary

  mpp_eds_icl:
    description: icl table used to define the limits of icl during eds in accordance with the soc table above
    $ref: /schemas/types.yaml#/definitions/uint32-arrary

  google,wlc_mod_depth_max:
    description: max depth for dynamic modulation
    $ref: /schemas/types.yaml#/definitions/uint8

  google,wlc_mod_soc:
    description: soc level reached for activating dynamic modulation
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - irq-gpio
  - ap5v-gpio
  - mode-gpio
  - inhibit-gpio

dependencies:
  google,eoc_mw_thresholds: [ 'google,eoc_soc_thresholds' ]
