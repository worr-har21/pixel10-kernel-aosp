%YAML 1.2
---

$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google Battery Current Limiter driver

maintainers:
  - George Lee <geolee@google.com>
  - Sam Ou <samou@google.com>
  - Hiroshi Akiyama <hiroshiakiyama@google.com>
  - Allen Jiang <alljiang@google.com>
  - Jasmine Cha <chajasmine@google.com>
  - Maggie Cheng <maggiecheng@google.com>

description:
  Google Battery Current Limiter driver.

  Main for mitigating brownout

properties:
  # A dictionary of DT properties for this binding schema
  compatible:
    enum:
      - google-mitigation

  google,ifpmic:
    description: IFPMIC enum
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_lower:
    description: Lower BATOILO1 threshold Limit
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_upper:
    description: Upper BATOILO1 threshold Limit
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_lower:
    description: Lower BATOILO2 threshold Limit
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_upper:
    description: Upper BATOILO2 threshold Limit
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_wlc_trig_lvl:
    description: BATOILO threshold during Battery Share
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_wlc_trig_lvl:
    description: BATOILO2 threshold during Battery Share
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_trig_lvl:
    description: BATOILO threshold during normal usage
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_trig_lvl:
    description: BATOILO2 threshold during normal usage
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_usb_trig_lvl:
    description: BATOILO threshold when plugged in
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_usb_trig_lvl:
    description: BATOILO2 threshold when plugged in
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_bat_open_to:
    description: BATOILO timer when BATFET opens
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo2_bat_open_to:
    description: BATOILO2 timer when BATFET opens
    $ref: /schemas/types.yaml#/definitions/int32

  batoilo_rel:
    description: BATOILO VDROOP release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo2_rel:
    description: BATOILO2 VDROOP release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo_int_rel:
    description: BATOILO release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo2_int_rel:
    description: BATOILO2 release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo_det:
    description: BATOILO VDROOP detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo2_det:
    description: BATOILO2 VDROOP detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo_int_det:
    description: BATOILO detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  batoilo2_int_det:
    description: BATOILO2 detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  uvlo1_rel:
    description: UVLO1 release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  uvlo2_rel:
    description: UVLO2 release timer
    $ref: /schemas/types.yaml#/definitions/uint32

  uvlo1_det:
    description: UVLO1 detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  uvlo2_det:
    description: UVLO2 detect deglitch timer
    $ref: /schemas/types.yaml#/definitions/uint32

  evt_cnt_enable:
    description: Event Counter Enable
    $ref: /schemas/types.yaml#/definitions/uint32

  evt_cnt_rate:
    description: Event Counter Sampling Rate
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_cpu1_ch:
    description: ODPM channel for cpu1 for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_cpu1_pmic:
    description: ODPM pmic for cpu1 for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_cpu2_ch:
    description: ODPM channel for cpu2 for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_cpu2_pmic:
    description: ODPM pmic for cpu2 for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_tpu_ch:
    description: ODPM channel for tpu for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_tpu_pmic:
    description: ODPM pmic for tpu for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_gpu_ch:
    description: ODPM channel for gpu for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  odpm_gpu_pmic:
    description: ODPM pmic for gpu for sys-evt collection
    $ref: /schemas/types.yaml#/definitions/uint32

  vimon_pwr_loop_thresh:
    description: Battery current threshold for vimon power loop
    $ref: /schemas/types.yaml#/definitions/uint32

  vimon_pwr_loop_cnt:
    description: vimon sample num to start power loop
    $ref: /schemas/types.yaml#/definitions/uint32

  aur_con_heavy:
    description: AUR heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  tpu_con_heavy:
    description: TPU heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  gpu_con_heavy:
    description: GPU heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu0_con_heavy:
    description: CPU0 heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1a_con_heavy:
    description: CPU1A heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1b_con_heavy:
    description: CPU1B heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu2_con_heavy:
    description: CPU2 heavy divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  aur_con_light:
    description: AUR light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  tpu_con_light:
    description: TPU light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  gpu_con_light:
    description: GPU light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu0_con_light:
    description: CPU0 light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1a_con_light:
    description: CPU1A light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1b_con_light:
    description: CPU1B light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu2_con_light:
    description: CPU2 light divider ratio setting
    $ref: /schemas/types.yaml#/definitions/uint32

  aur_mitigation_res_en:
    description: AUR mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  tpu_mitigation_res_en:
    description: TPU mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  gpu_mitigation_res_en:
    description: GPU mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu0_mitigation_res_en:
    description: CPU0 mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1a_mitigation_res_en:
    description: CPU1A mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1b_mitigation_res_en:
    description: CPU1B mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu2_mitigation_res_en:
    description: CPU2 mitigation response setting
    $ref: /schemas/types.yaml#/definitions/uint32

  aur_mitigation_type:
    description: AUR mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  tpu_mitigation_type:
    description: TPU mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  gpu_mitigation_type:
    description: GPU mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu0_mitigation_type:
    description: CPU0 mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1a_mitigation_type:
    description: CPU1A mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu1b_mitigation_type:
    description: CPU1B mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  cpu2_mitigation_type:
    description: CPU2 mitigation type setting
    $ref: /schemas/types.yaml#/definitions/uint32

  freq_qos:
    description: QOS settings for different zones; cpu0, cpu1, cpu2, gpu, tpu, gxp
    $ref: /schemas/types.yaml#/definitions/uint32-array

  non_monitored_module_ids:
    description: ID of module that will not report stats prior to brownout
    $ref: /schemas/types.yaml#/definitions/uint32

  main_limit:
    description: Thresholds for ODPM PWRWARN IRQ for main PMIC

  sub_limit:
    description: Thresholds for ODPM PWRWARN IRQ for sub PMIC

  module_id:
    description: Module mitigation stats prior to brownout for main pmic

  sub_mitigation:
    description: Module mitigation stats prior to brownout for sub pmic

  module_id:
    description: ID of module that will report stats prior to brownout
    $ref: /schemas/types.yaml#/definitions/uint32

  threshold:
    description: Threshold for when the module is counted
    $ref: /schemas/types.yaml#/definitions/uint32

  ocp_batfet_timeout:
    description: VDROOP2 OCP batfet timer
    $ref: /schemas/types.yaml#/definitions/uint16

  vimon_pwr_loop_en:
    description: vimon power loop enable
    $ref: /schemas/types.yaml#/definitions/flag

  ocp_batfet_timeout_en:
    description: VDROOP2 OCP batfet timer enable
    $ref: /schemas/types.yaml#/definitions/flag

  pre_uvlo_th:
    description: PRE_UVLO threshold setting
    $ref: /schemas/types.yaml#/definitions/uint8

  pre_uvlo_debounce:
    description: PRE_UVLO debounce setting
    $ref: /schemas/types.yaml#/definitions/uint8

