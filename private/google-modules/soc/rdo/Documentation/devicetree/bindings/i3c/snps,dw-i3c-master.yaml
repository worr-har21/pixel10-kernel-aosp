%YAML 1.2
---
$id: http://devicetree.org/schemas/i3c/snps,dw-i3c-master.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Synopsys DesignWare I3C master block

maintainers:
  - Alexandre Belloni <alexandre.belloni@bootlin.com>

allOf:
  - $ref: i3c.yaml#

properties:
  compatible:
    const: snps,dw-i3c-master-1.00a

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  interrupts:
    maxItems: 1

  ibi-capable:
    type: boolean
    description: Mark if the device supports In-Band Interrupt

  hybrid-busy-wait-mode:
    type: boolean
    description:
      True if desired operation (transfer execution) mode is hybrid, false if
      interrupt mode should always be used. If not present, false/ir mode is
      automatically assumed

  i2c-hybrid-threshold:
    type: u32
    maxItems: 1
    description:
      If hybrid-busy-wait-mode is true, then this threshold is used to switch
      between busy-waiting and interrupt modes; busy-waiting is used for values
      below the threshold, otherwise interrupt mode is used.
      Unit is Bytes. It is recommended to omit this property, so the default
      value is used, unless one is sure of their choice and wants to customise
      the functionality.

  i3c-hybrid-threshold:
    type: u32
    maxItems: 1
    description:
      If hybrid-busy-wait-mode is true, then this threshold is used to switch
      between busy-waiting and interrupt modes; busy-waiting is used for values
      below the threshold, otherwise interrupt mode is used
      Unit is Bytes. It is recommended to omit this property, so the default
      value is used, unless one is sure of their choice and wants to customise
      the functionality.

  external-power-control:
    type: boolean
    description: Enable external power control instead of auto runtime PM

required:
  - compatible
  - reg
  - clocks
  - interrupts

unevaluatedProperties: false

examples:
  - |
    i3c-master@2000 {
        compatible = "snps,dw-i3c-master-1.00a";
        #address-cells = <3>;
        #size-cells = <0>;
        reg = <0x02000 0x1000>;
        interrupts = <0>;
        clocks = <&i3cclk>;

        hybrid-busy-wait-mode;
        i2c-hybrid-threshold = <30>;
        i3c-hybrid-threshold = <30>;

        eeprom@57{
            compatible = "atmel,24c01";
            reg = <0x57 0x0 0x10>;
            pagesize = <0x8>;
        };
    };
...
