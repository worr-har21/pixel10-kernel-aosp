%YAML 1.2
---
$id: http://devicetree.org/schemas/qos_box/google,qos_box_core.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google QoS box Core

maintainers:
  - Aaron Tian <aarontian@google.com>

description:
  The Google QoS box Core doesn't represent a real physical device, it is a container
  to all QoS box device instances and provides QoS box use-case APIs for other drivers
  to attach/detach its use-case requirements.

properties:
  compatible:
    enum:
      - google,qos-box-core

  "google,num_qos_box":
    $ref: /schemas/types.yaml#/definitions/uint32
    description: number of total QoS box device instances

  "google,num_use_case":
    $ref: /schemas/types.yaml#/definitions/uint32
    description: number of QoS box use cases

  "google,use_case_prio":
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 2
    description: an array of (use case index, use case priority) pairs to define
      priorities of each use case.

required:
  - compatible
  - "google,num_qos_box"
  - "google,num_use_case"
  - "google,use_case_prio"

additionalProperties: false

examples:
  - |
    qos_core: qos_box_core {
        compatible = "google,qos-box-core";
        google,num_qos_box = <QOS_BOX_IDX_TOTAL>;
        google,num_use_case = <1>;
        google,use_case_prio = <QOS_BOX_CASE_DEFAULT QOS_BOX_PRIORITY_DEFAULT>;
    };
