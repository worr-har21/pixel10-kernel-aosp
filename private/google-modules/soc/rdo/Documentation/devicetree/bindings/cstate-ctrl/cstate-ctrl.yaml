%YAML 1.2 --- $id:
  http://devicetree.org/schemas/cstate-ctrl/google,cstate-ctrl.yaml# $schema:
    http://devicetree.org/meta-schemas/core.yaml#

title: Google CPU cluster C-state control

maintainers: - Henry Chow<henrychow@google.com>

description:
  Defines the power domain properties to control during runtime.

properties:
  power-domains:
    description:
      Defines the genpd power domain for the driver to vote for in order
      to prevent it from being powered down even if all client votes are
      relinquished.

  debugfs-name:
    description:
      Optionally define the name of the debugfs node. If absent, the genpd
      power domain name will be used.

  disable-on-boot:
    description:
      Optional flag to automatically prevent this CPU cluster from being
      powered down.
