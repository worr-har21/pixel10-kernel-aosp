%YAML 1.2
---
$id: http://devicetree.org/schemas/thermal/google,tmu-thermal.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google thermal stats driver

maintainers:
  - Jikai Ma <jikai@google.com>

description: |
  Thermal stats includes temperature residency and daily max/min temperature.
  Stats data of HW thermal zones is maintained locally and exchanged with kernel
  via shared memory. This driver communicates with hardware and registers HW
  thermal zones to the kernel Pixel Metrics driver and provides callback
  functions to retrieve and configure stats data of HW thermal zones.

properties:
  compatible:
    const: google,tmu-stats

  group-name:
    description:
      Group name that this driver uses to register HW thermal zones.

additionalProperties: false

examples:
  - |
    tmu_stats: tmu_stats {
      compatible = "google,tmu-stats";
      group-name = "tmu";
    };
