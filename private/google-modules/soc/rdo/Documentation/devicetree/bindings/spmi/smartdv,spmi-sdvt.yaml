%YAML 1.2
---
$id: http://devicetree.org/schemas/spmi/smartdv,spmi-sdvt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SmartDV IP Solutions SPMI Controller

maintainers:
  - Vamshi Gajjela <vamshigajjela@google.com>

description: |
  Supports 2.0 and 1.0 MIPI SPMI Specification
  Full MIPI SPMI Master functionality
  Supports Command, Data/Address and No Response Frames
  Supports ACK/NACK as per 2.0 specs
  Supports transfer Bus Ownership Command Sequence.
  Supports Connect/Disconnect Sequence.
  Support Master priority arbitration
  Supports extended register read/writes
  Supports wakeup command
  Authentication Command Sequence
  Device Descriptor Block command Sequences

allOf:
  - $ref: spmi.yaml#

properties:

  $nodename:
    pattern: "spmi@[0-9a-f]"

  compatible:
    oneOf:
      - const: smartdv,spmi
  reg:
    maxItems: 1

  clocks:
    description: |
      Core clock to the controller from which scl is derived. Optional if
      controller has a free running clock, but need to provide the
      frequency in Hz using clock-frequency.
    maxItems: 1

  resets:
    description: |
      Controller exclusive reset, an optional property.
    maxItems: 1

  clock-frequency:
    description: |
      Supply clock-frequency in Hz, if it's a free running clock to the
      controller or when clk_get_rate doesn't work.

  interrupts-extended:
    description: |
      One interrupt per channel. If not provided operates in polling mode.
    maxItems: 1

  master-arb-en:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Master arbitration is disabled by default, pass 1 to enable.

  master-id:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Master id for the controller on the bus. Default is 0, 1-3 are valid
      values, as only 4 master controllers or allowed on a bus.

  spmi-ver:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      MIPI SPMI Spec version 0/1 to choose for the transfer.
      Default value is 0 indicatng version 1.0

  arb-retry-limit:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Master arbitration retry limit. 0-255 are allowed values. Number of
      times master will retry a command when master loses arbitration.

  prescalar:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Divider value to generate SPMI SCL from input core clock.
      Input clock is divided with this value to drive the o_spmi_scl clock.
      Writing to this register divides the system clock by 2, similarly for
      the value "n", it divides the system clock by "n*2".
      0-255 are allowed values.

  read-latancy:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Read latancy, this value is used to pause the SCL while reading the
      data from the master/slave. 0-255 are allowed values.

  arb-scl-delay:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Controls the delay between arbitration and SSC delay.
      0-3 are allowed values.

required:
  - compatible
  - reg

patternProperties:
  "@[0-9a-f]$":
    type: object

    description: |
      PMIC properties, which are specific to the used SPMI PMIC device(s).

unevaluatedProperties: false

examples:
  - |
    bus {
      #address-cells = <2>;
      #size-cells = <2>;

      spmi: spmi@fff24000 {
        compatible = "google,sdvt-spmi";
        #address-cells = <2>;
        #size-cells = <0>;
        reg = <0x0 0xfff24000 0x0 0x1000>;

        pmic@0 {
          reg = <0 0>;
          /* pmic properties */
        };
      };
    };
