%YAML 1.2
---
$id: http://devicetree.org/schemas/dma/google,gpdma.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google General Purpose DMA Driver

maintainers:
  - Joy Chakraborty <joychakr@google.com>

description:
  The Google General Purpose DMA Driver configures Google SOC specific components
  placed around a dma-controller to meet SOC requirements.
  The HW wrapper is present around a PL330 DMA controller which houses a REQ-ACK
  matrix resposible for routing Peripheral request/acknowledge signals to DMA
  inputs and contains registers to drive AxUser signals required for QoS.

properties:
  compatible:
    enum:
      - google,gpdma

  reg:
    items:
      - description: DMA Request/Acknowledgment Matrix Registers
      - description: AxUser Signal manipulation Registers

  reg-names:
    items:
      - const: req_ack_csr
      - const: axuser_csr

  power-domains:
    maxItems: 1

  "#dma-cells":
    const: 2
    description: DMA Request router needs 2 arguments
                 1. Type of channel, 0 - TX and 1 - RX
                 2. Peripheral source index.
  dma-channels:
    description: Number of physical channels of DMA controller child.

  dma-requests:
    description: Number of peripheral requests supported by DMA
                 controller child.

  google,qos-vc:
    description: Virtual Channel to meet QoS required.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0,1,2,3,4,5]

  "#address-cells": true
  "#size-cells": true
  ranges: true

patternProperties:
  "^dma-controller@[0-9a-f]+$":
    oneOf:
      - $ref: /schemas/dma/arm,pl330.yaml

required:
  - compatible
  - reg
  - reg-names
  - "#dma-cells"
  - dma-channels
  - dma-requests
  - qos-vc
  - "#address-cells"
  - "#size-cells"
  - ranges

additionalProperties: false

examples:
  - |
    gpdma0: gpdma_wrapper@3b990000 {
      compatible = "google,gpdma";
      reg = <0 0x3b9d0000 0 0x80>,
            <0 0x3b9910c0 0 0x90>;
      reg-names = "req_ack_csr", "axuser_csr";
      #address-cells = <2>;
      #size-cells = <2>;
      #dma-cells = <2>;
      dma-channels = <9>;
      dma-requests = <32>;
      google,qos-vc = <1>;
      power-domains = <&sswrp_gpdma_pd>;
      ranges;
      dma-controller@12680000 {
          compatible = "arm,pl330", "arm,primecell";
          reg = <0x12680000 0x1000>;
          interrupts = <99>;
          #dma-cells = <1>;
      };
    };

...