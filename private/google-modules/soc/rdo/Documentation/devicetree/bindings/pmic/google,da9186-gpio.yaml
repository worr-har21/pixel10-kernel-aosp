%YAML 1.2
---
$id: http://devicetree.org/schemas/pmic/google,da9186-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Dialog Semiconductor DA9186 PMIC GPIO driver

maintainers:
  - Ryan Chu <cychu@google.com>

description: |
  This binding describes the Pinctrl and GPIO instance inside the DA9186/7 PMIC.
  Since PMIC GPIO only got GPIO functionality, pinctrl is for switching
  pin config (input / output / bias).
  The pin function / pin mux are fixed to GPIO only.

properties:
  compatible:
    const: google,da9186-gpio

  mba-dest-channel:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: The mailbox tx destination channel.
    maxItems: 1

  mboxes:
    description: A mailbox phandle and rx channel specifier.
    maxItems: 1

  gpio-controller: true

  "#gpio-cells":
    const: 2
    description: |
      The first cell is the pin number and the second cell is used to specify
      optional parameters.

  ngpio:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: The number of GPIO pins supported consecutively.
    minimum: 1
    maximum: 19

  gpio-line-names:
    description: Strings describing the names of each gpio line.
    minItems: 1
    maxItems: 19

  gpio-ranges:
    description: |
      This ties the pinctrl pin number to GPIO number.
      The format is: <[pin controller phandle], [GPIO controller offset],
                      [pin controller offset], [number of pins]>
      Also see these documents for generic binding information:
        GPIO : gpio.txt
        Pinctrl: pinctrl-bindings.txt
    maxItems: 1

required:
  - compatible
  - mba-dest-channel
  - mboxes
  - gpio-controller
  - '#gpio-cells'
  - ngpio
  - gpio-ranges

additionalProperties: false

examples:
  - |
    da9186_pinctrl: da9186-gpio {
        compatible = "google,da9186-gpio";
        mba-dest-channel = <10>;
        mboxes = <&mbactrl_ap_cpm 19>;

        gpio-controller;
        #gpio-cells = <2>;
        ngpios = <19>;
        gpio-line-names = "LED 0",
            "LED 1",
            "LED 2",
            "LED 3",
            "LED 4",
            "LED 5",
            "LED 6",
            "LED 7",
            "LED 8",
            "LED 9",
            "LED 10",
            "LED 11",
            "LED 12",
            "LED 13",
            "LED 14",
            "LED 15",
            "LED 16",
            "LED 17",
            "LED 18";
        gpio-ranges = <&da9186_pinctrl 0 0 19>;
    };
