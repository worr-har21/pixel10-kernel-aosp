%YAML 1.2
---
$id: http://devicetree.org/schemas/pmic/google,da9186-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Dialog Semiconductor DA9186 PMIC Regulator

maintainers:
  - Ryan Chu <cychu@google.com>

description: |
  This binding describes the Regulator instance inside the DA9186/7 PMIC.

properties:
  compatible:
    const: google,da9186-regulator

  mba-dest-channel:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: The mailbox tx destination channel.
    maxItems: 1

  mboxes:
    description: A mailbox phandle and rx channel specifier.
    maxItems: 1

  regulators:
    type: object
    properties:
      morro_m:
        description: List of regulators provided by DA9186.
        type: object
        patternProperties:
          "^(buck_([1-9]|10)m|ldo_([1-9]|1[0-9]|2[0-9]|3[0-1])m)$":
            type: object
            # As this file is not in the /common/Documentation/devicetree/
            # bindings/, so the regulator.yaml is not yet reachable.
            # $ref: ../regulator/regulator.yaml
            description:
              Properties for single buck/ldo regulator.
            properties:
              google,monitor-only:
                type: boolean
                description: |
                  Mark this regulator to only supports the read ops, not be
                  able to control or write. This avoids the conflict if the
                  regulator is already controlled by the other sources, or the
                  default state of the regulator should not be changed.
                  In default, all regulators are defined with this property
                  unless manual control is needed.
                  If this property is not defined, the driver can have full
                  control of the regulator.
              google,buck-rail:
                type: boolean
                description: |
                  Mark this to distinguish the regulator is BUCK or LDO. BUCK
                  and LDO have different factors while calculating telemetry
                  measurement. This property will be read to decide the factor.
            unevaluatedProperties: false

        additionalProperties: false

      morro_s:
        description: List of regulators provided by DA9187.
        type: object
        patternProperties:
          "^(buck_([1-9]|1[0-3])s|buck_boost|ldo_([1-9]|1[0-9]|2[0-8])s)$":
            type: object
            # As this file is not in the /common/Documentation/devicetree/
            # bindings/, so the regulator.yaml is not yet reachable.
            # $ref: ../regulator/regulator.yaml
            description:
              Properties for single buck/ldo regulator.
            properties:
              google,monitor-only:
                type: boolean
                description: |
                  Mark this regulator to only supports the read ops, not be
                  able to control or write. This avoids the conflict if the
                  regulator is already controlled by the other sources, or the
                  default state of the regulator should not be changed.
                  In default, all regulators are defined with this property
                  unless manual control is needed.
                  If this property is not defined, the driver can have full
                  control of the regulator.
            unevaluatedProperties: false

        additionalProperties: false

    additionalProperties: false

required:
  - compatible
  - mba-dest-channel
  - mboxes
  - regulators

additionalProperties: false

examples:
  - |
    da9186_regulator: da9186-regulator {
        compatible = "google,da9186-regulator";
        mba-dest-channel = <10>;
        mboxes = <&mbactrl_ap_cpm 10>;

        regulators {
            morro_m {
                morro_buck_1m_reg: buck_1m {
                    regulator-name = "buck_1m";
                    regulator-min-microvolt = <450000>;
                    regulator-max-microvolt = <1400000>;
                    regulator-ramp-delay = <25000>;
                    regulator-enable-ramp-delay = <63>;
                    regulator-allowed-modes = <2 8>;
                    google,monitor-only;
                };
                morro_ldo_1m_reg: ldo_1m {
                    regulator-name = "ldo_1m";
                    regulator-min-microvolt = <450000>;
                    regulator-max-microvolt = <1400000>;
                    regulator-ramp-delay = <25000>;
                    regulator-enable-ramp-delay = <200>;
                    google,monitor-only;
                };
            };
            morro_s {
                morro_buck_13s_reg: buck_13s {
                    regulator-name = "buck_13s";
                    regulator-min-microvolt = <450000>;
                    regulator-max-microvolt = <1400000>;
                    regulator-ramp-delay = <25000>;
                    regulator-enable-ramp-delay = <63>;
                    regulator-allowed-modes = <2 8>;
                    schematic-name = "UFS_VCCQ";
                };
                morro_ldo_1s_reg: ldo_1s {
                    regulator-name = "ldo_1s";
                    regulator-min-microvolt = <450000>;
                    regulator-max-microvolt = <1400000>;
                    regulator-ramp-delay = <25000>;
                    regulator-enable-ramp-delay = <200>;
                    schematic-name = "AVDD075_MIPI_DSI";
                };
            };
        };
    };
