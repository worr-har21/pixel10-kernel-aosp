%YAML 1.2
---
$id: http://devicetree.org/schemas/display/gs-panel.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google Silicon Display Panel Driver (Generic)

maintainers:
  - Taylor Nelms <tknelms@google.com>

description:
  This document describes device tree properties for Google Silicon's display
  panel driver framework.

properties:
  compatible:
    $ref: /schemas/dtcore.yaml#/properties/compatible
    items:
      anyOf:
        - pattern: "^google,gs-.*$"
        - enum:
          - google,panel-gs-simple
          - google,panel-gs-simple-command

  label:
    $ref: /schemas/display/panel/panel-common.yaml#/properties/label
    maxItems: 1
    description: String used to match detected panel to panel driver.
      Used directly in bootloader handoff.

  channel:
    const: 0
    description: virtual channel id.

  allowed-hs-clks:
    description: allowed MIPI clock rates(Mbps) to be written in hs_clock node.

  reset-gpios:
    $ref: /schemas/display/panel/panel-common.yaml#/properties/reset-gpios
  tout-gpios:
    maxItems: 1
    description: Specifier for a GPIO for the proximity sensor synchronization
      signal. It also indicates the current refresh rate.

  vci-supply:
    description: VCI power supply for the panel
  vddi-supply:
    description: VDDI power supply for the panel
  vddd-supply:
    description: VDDD power supply for the panel
  vddd-gpios:
    maxItems: 1
    description: Specifier for a GPIO to control the vddd supply to the panel

  touch:
    $ref: /schemas/types.yaml#/definitions/phandle
    maxItems: 1
    description: Connection to touch node

  width-mm:
    $ref: /schemas/display/panel/panel-common.yaml#/properties/width-mm
  height-mm:
    $ref: /schemas/display/panel/panel-common.yaml#/properties/height-mm

  orientation:
    description: 0 is normal, 1 is bottom up, 2 is left up, 3 is right up
    enum: [0, 1, 2, 3]

  panel-timing:
    $ref: /schemas/display/panel/panel-common.yaml#/properties/panel-timing
    description: Optional panel timing override spec for drivers that support it

required:
  - compatible
  - label
  - channel

examples:
  - |
    panel_gs_simple_command_0: panel-gs-simple-command {
          compatible = "google,panel-gs-simple-command";
          label = "panel-gs-simple-command";
          channel = <0>;

          width-mm = <64>;
          height-mm = <48>;

          panel-timing {
                  clock-frequency = <22464000>;
                  hactive = <640>;
                  hback-porch = <36>;
                  hfront-porch = <32>;
                  hsync-len = <12>;
                  vactive = <480>;
                  vback-porch = <24>;
                  vfront-porch = <12>;
                  vsync-len = <4>;
          };
    };
    google_gs_hk3: panel@0 {
        compatible = "google,gs-hk3";
        label = "google-hk3";
        channel = <0>;
        touch = <&spitouch>;

        /* reset, power */
        reset-gpios = <&gpp0 0 GPIO_ACTIVE_HIGH>;
        tout-gpios = <&gpp14 1 GPIO_ACTIVE_HIGH>;
        vci-supply = <&m_ldo14_reg>;
        vddi-supply = <&s_bucka_reg>;
        vddd-supply = <&disp_vddd>;
        vddd-gpios = <&gpp21 5 GPIO_ACTIVE_HIGH>;
    };
