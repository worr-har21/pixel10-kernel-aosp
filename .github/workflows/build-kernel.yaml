name: đźš€ Build Android Open Source Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: "đź“± Select target kernel and its devices"
        required: true
        type: choice
        options:
          - muzel | Pixel 10 / 10 Pro / 10 Pro XL / 10 Pro Fold
          - akita | Pixel 8a
          - bluejay | Pixel 6a
          - caimito | Pixel Fold 2
          - comet | Pixel 9
          - deepspace | Pixel 9 Pro
          - felix | Pixel Fold
          - gs101 | Generic GS101
          - gs201 | Generic GS201
          - lynx | Pixel 7a
          - pantah | Pixel 7 / 7 Pro
          - raviole | Pixel 6 / 6 Pro
          - shusky | Pixel 8 / 8 Pro
          - tangorpro | Pixel Tablet
          - tegu | Pixel 9 Pro XL
          - zuma | Pixel 8 / 8 Pro (GS201)
          - zumapro | Pixel 9 / 9 Pro (GS305)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: đź§© Checkout repository
        uses: actions/checkout@v4

      - name: đź§± Prepare environment
        run: |
          sudo apt update
          sudo apt install -y git gnupg flex bison build-essential libssl-dev \
            libncurses-dev zip unzip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo 

      - name: đź”Ť Extract codename and device name
        id: deviceinfo
        run: |
          CODENAME=$(echo "${{ github.event.inputs.device }}" | cut -d'|' -f1 | xargs)
          DEVICENAME=$(echo "${{ github.event.inputs.device }}" | cut -d'|' -f2 | xargs)
          echo "codename=$CODENAME" >> $GITHUB_OUTPUT
          echo "devicename=$DEVICENAME" >> $GITHUB_OUTPUT
          echo "đź“± Building kernel for: $DEVICENAME ($CODENAME)"

      - name: âš™ď¸Ź Build Kernel
        run: |
          export JAVA_HOME=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.17-10/x64
          export PATH=$JAVA_HOME/bin:$PATH
          bash private/devices/google/${{ github.event.inputs.device }}/build_${{ github.event.inputs.device }}.sh --config=pixel_debug_common
        shell: bash

      - name: đź§¬ Detect kernel version
        id: version
        run: |
          IMAGE_PATH=$(find out/${{ steps.deviceinfo.outputs.codename }}/dist -type f -name "Image" | head -n1)
          if [[ -f "$IMAGE_PATH" ]]; then
            VERSION=$(strings "$IMAGE_PATH" | grep "Linux version" | head -n1 | awk '{print $3}')
          else
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected kernel version: $VERSION"

      #- name: đź“¦ Package .img files into ZIP
      #  run: |
      #    cd out/${{ steps.deviceinfo.outputs.codename }}/dist
      #    ZIP_NAME="kernel-${{ steps.deviceinfo.outputs.codename }}-${{ steps.version.outputs.version }}.zip"
      #    zip -r "$ZIP_NAME" *.img
      #    echo "zipname=$ZIP_NAME" >> $GITHUB_OUTPUT
      #  id: zipfile

      - name: đź“¦ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.deviceinfo.outputs.codename }}-${{ steps.version.outputs.version }}"
          name: "Kernel ${{ steps.version.outputs.version }} for ${{ steps.deviceinfo.outputs.devicename }}"
          body: |
            đź§¬ **Kernel version:** `${{ steps.version.outputs.version }}`
            đź“± **Supported devices:** `${{ steps.deviceinfo.outputs.devicename }}`
            đź”– **Codename:** `${{ steps.deviceinfo.outputs.codename }}`
            âš™ď¸Ź **Commit:** `${{ github.sha }}`
            đź•’ Built on: `${{ github.run_date }}`
          files: |
            out/${{ steps.deviceinfo.outputs.codename }}/dist/*.img
            #out/${{ steps.deviceinfo.outputs.codename }}/dist/${{ steps.zipfile.outputs.zipname }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
